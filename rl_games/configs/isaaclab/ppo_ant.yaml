params:
  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [256, 128, 64]
      activation: elu
      initializer:
        name: default

  config:
    env_name: Isaac-Ant-v0
    name: isaaclab_ant
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    score_to_win: 6000
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    clip_value: True
    num_actors: 4096
    horizon_length: 16
    minibatch_size: 16384
    mini_epochs: 4
    critic_coef: 2
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    max_epochs: 500
    save_best_after: 50
    env_config:
      device: cuda:0
      clip_observations: 5.0
      clip_actions: 1.0
    player:
      render: False
      deterministic: True
      games_num: 20
