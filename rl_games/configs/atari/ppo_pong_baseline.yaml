params:
  seed: 42
  algo:
    name: a2c_discrete

  model:
    name: discrete_a2c

  network:
    name: actor_critic
    separate: False
    space:
      discrete:

    cnn:
      type: conv2d
      activation: elu
      permute_input: False
      initializer:
        name: default
      convs:
        - filters: 32
          kernel_size: 8
          strides: 4
          padding: 0
        - filters: 64
          kernel_size: 4
          strides: 2
          padding: 0
        - filters: 64
          kernel_size: 3
          strides: 1
          padding: 0

    mlp:
      units: [512]
      activation: elu
      initializer:
        name: orthogonal_initializer
        gain: 1.41421356237

  config:
    name: Pong_baseline
    env_name: atari_gymnasium
    score_to_win: 20.0
    normalize_value: True
    normalize_input: True
    reward_shaper:
      min_val: -1
      max_val: 1
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    grad_norm: 1.0
    entropy_coef: 0.01
    truncate_grads: True
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.01
    e_clip: 0.2
    clip_value: False
    num_actors: 64
    horizon_length: 128
    minibatch_size: 2048
    mini_epochs: 4
    critic_coef: 2
    max_epochs: 500
    device: cuda:0

    env_config:
      env_name: ALE/Pong-v5
      frameskip: 1
      use_async: False

    player:
      render: True
      games_num: 10
      deterministic: True
