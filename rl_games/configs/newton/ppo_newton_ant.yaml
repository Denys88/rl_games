# PPO with Newton GPU Ant — tuned hyperparams

params:
  seed: 42
  algo:
    name: a2c_continuous

  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [256, 256, 128]
      activation: elu
      initializer:
        name: default

  config:
    name: Newton_Ant_PPO
    env_name: newton_ant
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: True
    e_clip: 0.2
    clip_value: False
    num_actors: 1024
    horizon_length: 8
    minibatch_size: 2048
    mini_epochs: 3
    critic_coef: 2
    use_smooth_clamp: True
    bound_loss_type: regularisation
    bounds_loss_coef: 0.0
    device: cuda:0
    max_epochs: 2000

    env_config:
      device: cuda:0
      action_scale: 3.0
      sim_substeps: 4

    player:
      render: False
