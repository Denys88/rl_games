params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: false
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: true
    mlp:
      units:
      - 256
      - 128
      - 64
      activation: elu
      initializer:
        name: default
  config:
    name: MJLab_Go1_Velocity
    env_name: mjlab_go1_velocity
    normalize_input: true
    normalize_value: true
    value_bootstrap: true
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: true
    gamma: 0.99
    tau: 0.95
    learning_rate: 3e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: true
    e_clip: 0.2
    clip_value: false
    num_actors: 1024
    horizon_length: 16
    minibatch_size: 4096
    mini_epochs: 5
    critic_coef: 2
    use_smooth_clamp: true
    bound_loss_type: regularisation
    bounds_loss_coef: 0.0
    device: cuda:0
    max_epochs: 3000
    env_config:
      task_name: Mjlab-Velocity-Flat-Unitree-Go1
      device: cuda
    player:
      render: false
    vecenv_type: MJLAB
    algo_observer: isaac
