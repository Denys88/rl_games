params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: false
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: true
    mlp:
      units:
      - 1024
      - 512
      - 256
      - 128
      activation: elu
      initializer:
        name: default
  config:
    name: WujiHand_Reorient_Classic
    env_name: mjlab_wuji_classic
    vecenv_type: MJLAB
    algo_observer: isaac
    import_modules:
    - rl_games.envs.mjlab_tasks.wuji_reorient_classic
    normalize_input: true
    normalize_value: true
    value_bootstrap: true
    reward_shaper:
      scale_value: 0.01
    normalize_advantage: true
    gamma: 0.99
    tau: 0.95
    learning_rate: 0.0005
    lr_schedule: adaptive
    schedule_type: standard
    kl_threshold: 0.016
    grad_norm: 1.0
    entropy_coef: 0.0
    truncate_grads: true
    e_clip: 0.2
    clip_value: true
    num_actors: 8192
    horizon_length: 16
    minibatch_size: 32768
    mini_epochs: 5
    critic_coef: 4
    bounds_loss_coef: 0.0001
    device: cuda:0
    max_epochs: 2000
    save_frequency: 200
    env_config:
      task_name: WujiHand_Reorient_Classic
      device: cuda
    player:
      render: false
