# G1 rough velocity - RSL v2: no terrain curriculum, keep velocity curriculum
# Terrain curriculum caps reward by pushing to harder terrain as robot improves
params:
  seed: 42
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd
  network:
    name: actor_critic
    separate: True
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init:
          name: default
        sigma_init:
          name: const_initializer
          val: 0
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      activation: elu
      initializer:
        name: default
  config:
    name: MJLab_G1_Velocity_Rough_RSL_v2
    env_name: mjlab_g1_velocity_rough
    normalize_input: True
    normalize_value: True
    value_bootstrap: True
    reward_shaper:
      scale_value: 1.0
    normalize_advantage: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 1e-3
    lr_schedule: adaptive
    kl_threshold: 0.01
    grad_norm: 1.0
    entropy_coef: 0.001
    truncate_grads: True
    e_clip: 0.2
    clip_value: True
    num_actors: 1024
    horizon_length: 24
    minibatch_size: 6144
    mini_epochs: 5
    critic_coef: 1
    use_smooth_clamp: True
    bound_loss_type: regularisation
    bounds_loss_coef: 0.0
    device: cuda:0
    max_epochs: 30000
    env_config:
      task_name: Mjlab-Velocity-Rough-Unitree-G1
      device: cuda
      use_central_value: True
    player:
      render: False
    central_value_config:
      minibatch_size: 6144
      mini_epochs: 5
      learning_rate: 1e-3
      clip_value: True
      normalize_input: True
      truncate_grads: True
      grad_norm: 1.0
      network:
        name: actor_critic
        central_value: True
        mlp:
          units: [512, 256, 128]
          activation: elu
          initializer:
            name: default
