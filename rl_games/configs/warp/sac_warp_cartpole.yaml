# SAC with Warp GPU CartPole (continuous actions)

params:
  seed: 42
  algo:
    name: sac

  model:
    name: soft_actor_critic

  network:
    name: soft_actor_critic
    separate: True
    space:
      continuous:
    mlp:
      units: [64, 64]
      activation: relu
      initializer:
        name: default
    log_std_bounds: [-5, 2]

  config:
    name: warp_cartpole_sac
    env_name: warp_cartpole_continuous
    normalize_input: False
    reward_shaper:
      scale_value: 1.0
    gamma: 0.99
    critic_tau: 0.005
    init_alpha: 1.0
    learnable_temperature: True
    actor_lr: 3e-4
    critic_lr: 3e-4
    alpha_lr: 3e-4
    batch_size: 256
    replay_buffer_size: 100000
    num_warmup_steps: 2
    num_steps_per_episode: 32
    max_epochs: 500
    device: cuda:0
    num_actors: 1024

    env_config:
      env_name: warp_cartpole_continuous
      device: cuda:0

    player:
      render: False
