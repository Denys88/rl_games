# Phase C v3 — preserve cur3's PROVEN dense reward (the chase-and-push
# engine that produced 0.17 g/ep baseline) but boost the goal terminal 10x
# so PPO has a strong reason to actually convert push-attempts into shots.
#
# Lessons from prior attempts:
#   - phaseC1 (behind_ball=1.0): policy farmed positional reward, 0 goals.
#   - phaseC2 (light shaping, big goal): chase reflex atrophied with less
#     dense signal, still 0.025 g/ep.
#   - cur3 baseline + sigma fix: 0.17 g/ep — proven floor.
# Conclusion: keep cur3 weights verbatim, ADD a 10x bigger goal terminal,
# train from the cur3 bootstrap directly (skip phaseB3 detour).
#
# Bootstrap: /tmp/cur3_for_phaseB.pth (cur3_push ep_800 + sigma=-0.7).
#
# Reward — cur3 weights + 10x goal:
#   vel_to_ball:           0.5     cur3 — primary chase reflex
#   vel_ball_to_goal:      2.0     cur3 — push direction
#   veloc_forward:         0.05    cur3 — small "move forward" bias
#   ball_near_goal_bonus:  0.5     cur3 (radius 3.0) — funnel near goal
#   behind_ball_bonus:     0.5     cur3 — correct-side approach
#   goal:                  500     ⬆ 10x cur3 — make conversions matter
#
# Opponent: random (vs-random training preserves scoring signal).
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: -0.7 }
        fixed_sigma: True
        learnable_sigma: False
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }
  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_phaseC3
    reward_shaper: { min_val: -10, scale_value: 1.0 }
    normalize_advantage: True
    normalize_input: True
    normalize_value: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 1.5e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.0
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True
    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4
    save_best_after: 50
    save_frequency: 100
    score_to_win: 100000
    max_epochs: 3000
    player: { render: False, games_num: 20, deterministic: True }
    env_config:
      team_size: 2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: random
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      shaping_weights:
        vel_to_ball: 0.5
        vel_ball_to_goal: 2.0
        veloc_forward: 0.05
        ball_near_goal_bonus: 0.5
        ball_near_goal_radius: 3.0
        behind_ball_bonus: 0.5
        goal: 500.0
        ball_field_progress: 0.0
      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
