# Phase A v2 — stay in noop-opponent regime (where cur3 mastered chase+push),
# but PUMP goal-scoring signals hard. Evaluate vs random afterwards.
#
# Lesson from phaseA v1 (random-opp): random opps kick the ball into our goal
# ~3x per 10 eps, erasing every gain. Eval-vs-random and TRAIN-vs-noop split.
#
# Reward shifts vs cur3:
#   goal:                       50 → 300   (6x — single goal ≈ 1+ ep shaping)
#   ball_near_goal_bonus:      0.5 → 3.0   (6x — dominant pull into goal zone)
#   ball_near_goal_radius:     3.0 → 5.0   (bigger funnel, covers half the
#                                            attack-half width)
#   vel_to_ball:               0.5 → 0.3   (slightly muted, chase still alive)
#   vel_ball_to_goal:          2.0 → 3.0   (slight bump — push reward)
#   reward_shaper min_val:      -5 → -10   (don't clip dense bonus dynamics)
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: 0 }
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }
  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_phaseA2
    reward_shaper: { min_val: -10, scale_value: 1.0 }
    normalize_advantage: True
    normalize_input: True
    normalize_value: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 2.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.01
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True
    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4
    save_best_after: 50
    save_frequency: 100
    score_to_win: 100000
    max_epochs: 1800
    player: { render: False, games_num: 20, deterministic: True }
    env_config:
      team_size: 2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: noop
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      shaping_weights:
        vel_to_ball: 0.3
        vel_ball_to_goal: 3.0
        veloc_forward: 0.05
        ball_field_progress: 0.0
        ball_near_goal_bonus: 3.0   # PRIMARY signal
        ball_near_goal_radius: 5.0  # bigger goal zone
        behind_ball_bonus: 0.5
        goal: 300.0
      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
