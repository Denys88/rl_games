# dm_control 1v1 ANT soccer — curriculum fallback if v2 (2v2) can't score.
#
# Same network/PPO setup as v2, but team_size=1 — one ant per side, no
# teammate. Far easier coordination problem; if 2v2 stays scoreless, train
# 1v1 first, then transfer.
#
# Use this when v2 plateaus without goal scoring. Resume from any v2/Phase-1
# checkpoint:
#   python -u runner.py --train \
#       --file rl_games/configs/dm_control/ppo_soccer_ant_1v1.yaml \
#       --checkpoint <pth-from-v2-or-phase1>
#
params:
  torch_threads: 4
  algo:
    name: a2c_continuous
  model:
    name: continuous_a2c_logstd

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: 0 }
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }

  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_1v1

    reward_shaper:
      min_val: -20
      scale_value: 1.0

    normalize_advantage: True
    normalize_input: True
    normalize_value: True

    gamma: 0.995
    tau: 0.95
    learning_rate: 3.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.008

    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.001
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True

    # 1 agent per env → 24 streams instead of 48 → smaller minibatch.
    num_actors: 24
    horizon_length: 128
    minibatch_size: 768
    mini_epochs: 4

    save_best_after: 50
    save_frequency: 200
    score_to_win: 1500
    max_epochs: 8000

    self_play_config:
      update_score: 25.0
      games_to_check: 50
      check_scores: False
      env_update_num: 1

    player:
      render: False
      games_num: 20
      deterministic: True

    env_config:
      team_size: 1                 # ← curriculum: 1v1 instead of 2v2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: True
      shaped_reward: True
      opponent_kind: policy
      central_value: False
      shaping_weights:
        vel_to_ball: 0.01
        vel_ball_to_goal: 0.2
        veloc_forward: 0.005
        goal: 200.0

      opponent_factory_config:
        model_name: continuous_a2c_logstd
        normalize_input: True
        normalize_value: True
        pool_size: 8
        deterministic: True
        device: cpu
        network_params:
          name: actor_critic
          separate: False
          space:
            continuous:
              mu_activation: None
              sigma_activation: None
              mu_init: { name: default }
              sigma_init: { name: const_initializer, val: 0 }
              fixed_sigma: True
          mlp:
            units: [512, 256, 128]
            d2rl: False
            activation: elu
            initializer: { name: default }

      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
