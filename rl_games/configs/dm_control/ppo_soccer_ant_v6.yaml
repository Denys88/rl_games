# dm_control 2v2 ANT soccer — v6: forced exploration via entropy.
#
# All previous iterations plateaued at ~15% goal rate. PPO converged to
# "exploit the shaping" instead of "score". v6 ramps entropy coef 10×
# (0.005 → 0.05) to keep the policy stochastic enough to escape the
# shaping attractor and stumble into more goal events.
#
# Combined with v5c's smart shaping (behind_ball_bonus + ball_near_goal_bonus)
# and Phase-1 chase init, the goal here is goals/ep > 0.5.
#
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }

  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: 0 }
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }

  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_v6

    reward_shaper:
      min_val: -50
      scale_value: 1.0

    normalize_advantage: True
    normalize_input: True
    normalize_value: True

    gamma: 0.998
    tau: 0.95
    learning_rate: 3.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.016    # 2× v5c — allow bigger policy updates per step

    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.05    # ← THE KEY LEVER (10× v5c)
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True

    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4

    save_best_after: 50
    save_frequency: 200
    score_to_win: 5000
    max_epochs: 12000

    self_play_config:
      update_score: 200.0
      games_to_check: 100
      check_scores: False
      env_update_num: 1

    player:
      render: False
      games_num: 20
      deterministic: True

    env_config:
      team_size: 2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: policy
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      shaping_weights:
        vel_to_ball: 0.02
        vel_ball_to_goal: 0.2
        veloc_forward: 0.005
        ball_near_goal_bonus: 0.5
        ball_near_goal_radius: 3.0
        ball_field_progress: 0.0
        behind_ball_bonus: 0.5
        goal: 200.0

      opponent_factory_config:
        model_name: continuous_a2c_logstd
        normalize_input: True
        normalize_value: True
        pool_size: 8
        deterministic: True
        device: cpu
        network_params:
          name: actor_critic
          separate: False
          space:
            continuous:
              mu_activation: None
              sigma_activation: None
              mu_init: { name: default }
              sigma_init: { name: const_initializer, val: 0 }
              fixed_sigma: True
          mlp:
            units: [512, 256, 128]
            d2rl: False
            activation: elu
            initializer: { name: default }

      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
