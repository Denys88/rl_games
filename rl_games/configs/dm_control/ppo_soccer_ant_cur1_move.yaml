# Curriculum stage 1: LEARN TO MOVE
# Reward only forward velocity. Ant learns locomotion from scratch.
# Fresh init, ~10-15 min training, expected output: ant runs consistently.
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: 0 }
        fixed_sigma: True
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }
  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_cur1_move
    reward_shaper: { min_val: -5, scale_value: 1.0 }
    normalize_advantage: True
    normalize_input: True
    normalize_value: True
    gamma: 0.99
    tau: 0.95
    learning_rate: 3.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.01
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True
    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4
    save_best_after: 50
    save_frequency: 200
    score_to_win: 1000
    max_epochs: 500
    player: { render: False, games_num: 20, deterministic: True }
    env_config:
      team_size: 2
      time_limit: 15.0          # short — locomotion doesn't need long episodes
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: noop       # opp ants stay still, no interference
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      shaping_weights:
        # ONLY locomotion reward.
        vel_to_ball: 0.0
        vel_ball_to_goal: 0.0
        veloc_forward: 1.0       # PRIMARY signal
        ball_field_progress: 0.0
        ball_near_goal_bonus: 0.0
        behind_ball_bonus: 0.0
        goal: 0.0
      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
