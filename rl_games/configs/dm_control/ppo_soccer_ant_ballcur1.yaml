# Ball curriculum stage 1 — ball spawns RIGHT AT opp goal mouth.
# Goal: any chase reflex trips the ball into the goal → PPO sees the +500
# reward immediately, locks in "score" credit assignment.
#
# Bootstrap: cur3 (chase reflex + sigma=-0.7) from /tmp/cur3_for_phaseB.pth.
#
# Reward — cur3 weights + goal 500 (same as phaseC3 but with curriculum):
#   vel_to_ball: 0.5, vel_ball_to_goal: 2.0, ball_near_goal_bonus: 0.0,
#   behind_ball_bonus: 0.0, goal: 500, veloc_forward: 0.05
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: 0 }
        fixed_sigma: True
        learnable_sigma: True
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }
  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_ballcur1
    reward_shaper: { min_val: -10, scale_value: 1.0 }
    normalize_advantage: True
    normalize_input: True
    normalize_value: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 1.5e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.0
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True
    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4
    save_best_after: 50
    save_frequency: 100
    score_to_win: 100000
    max_epochs: 1500   # cur3 ends at 800; train 700 more
    player: { render: False, games_num: 20, deterministic: True }
    env_config:
      team_size: 2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: random
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      # CURRICULUM STAGE 1 — ball right at opp goal
      ball_spawn_x_range: [5.0, 6.5]   # ~1-2.5m from opp goal mouth
      ball_spawn_y_range: [-1.5, 1.5]   # narrow, in front of goal
      shaping_weights:
        vel_to_ball: 0.5
        vel_ball_to_goal: 2.0
        veloc_forward: 0.05
        ball_near_goal_bonus: 0.0
        ball_near_goal_radius: 3.0
        behind_ball_bonus: 0.0
        goal: 1000.0
        ball_field_progress: 0.0
      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
