# Phase B — simplified reward + truly-fixed sigma + self-play vs frozen pool.
#
# What's "truly fixed" sigma:
#   network_builder.py learnable_sigma=False makes sigma a non-trainable buffer
#   (logstd = -0.7 → std ≈ 0.5 forever). PPO updates only mu; exploration noise
#   stays constant. This is the canonical "fixed exploration" PPO baseline that
#   self-play stability papers (e.g. Bansal+ '17, Liu+ '19) rely on.
#
# What's "simplified reward":
#   Drop ball_near_goal_bonus, ball_field_progress, behind_ball_bonus.
#   Keep: goal (large), vel_to_ball (small, basic locomotion bias),
#         vel_ball_to_goal (small, alignment bias). 3 terms total.
#
# Self-play: opponent_kind=policy with FrozenA2COpponent pool of 8 snapshots.
# update_score is set HIGH so push happens only on real improvement (avoid
# pool-thrash that distpen + v5 / v6 / v7 hit).
params:
  torch_threads: 4
  algo: { name: a2c_continuous }
  model: { name: continuous_a2c_logstd }
  network:
    name: actor_critic
    separate: False
    space:
      continuous:
        mu_activation: None
        sigma_activation: None
        mu_init: { name: default }
        sigma_init: { name: const_initializer, val: -0.7 }  # std ≈ 0.5
        fixed_sigma: True
        learnable_sigma: False   # NEW: non-trainable buffer
    mlp:
      units: [512, 256, 128]
      d2rl: False
      activation: elu
      initializer: { name: default }
  config:
    env_name: dm_soccer_ant
    name: dm_soccer_ant_phaseB
    reward_shaper: { min_val: -10, scale_value: 1.0 }
    normalize_advantage: True
    normalize_input: True
    normalize_value: True
    gamma: 0.998
    tau: 0.95
    learning_rate: 1.0e-4
    lr_schedule: adaptive
    kl_threshold: 0.008
    grad_norm: 1.0
    truncate_grads: True
    e_clip: 0.2
    entropy_coef: 0.0       # not needed — exploration is fixed via sigma
    critic_coef: 1.0
    bounds_loss_coef: 0.0001
    clip_value: True
    num_actors: 24
    horizon_length: 128
    minibatch_size: 1536
    mini_epochs: 4
    save_best_after: 50
    save_frequency: 100
    score_to_win: 100000
    max_epochs: 3000
    self_play_config:
      update_score: 80.0
      games_to_check: 100
      check_scores: False
      env_update_num: 1
    player: { render: False, games_num: 20, deterministic: True }
    env_config:
      team_size: 2
      time_limit: 30.0
      enable_field_box: True
      terminate_on_goal: False
      shaped_reward: True
      opponent_kind: policy
      central_value: False
      field_size: [15.0, 10.0]
      goal_size: [1.0, 6.0, 0.6]
      shaping_weights:
        # simplified — only 3 terms
        vel_to_ball: 0.2
        vel_ball_to_goal: 1.0
        goal: 100.0
        # all others explicitly zero
        veloc_forward: 0.0
        ball_field_progress: 0.0
        ball_near_goal_bonus: 0.0
        behind_ball_bonus: 0.0
      opponent_factory_config:
        model_name: continuous_a2c_logstd
        normalize_input: True
        normalize_value: True
        pool_size: 8
        deterministic: True
        device: cpu
        network_params:
          name: actor_critic
          separate: False
          space:
            continuous:
              mu_activation: None
              sigma_activation: None
              mu_init: { name: default }
              sigma_init: { name: const_initializer, val: -0.7 }
              fixed_sigma: True
              learnable_sigma: False
          mlp:
            units: [512, 256, 128]
            d2rl: False
            activation: elu
            initializer: { name: default }
      ray_config:
        num_cpus: 28
        include_dashboard: False
        log_to_driver: False
        object_store_memory: 2000000000
